name: Upload Python Package

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - v*  # supports semver and prerelease tags like v1.2.3.dev1

permissions: {}
jobs:
  deploy:
    permissions:
      contents: write # to create a release (actions/create-release)

    name: PyPI Upload
    runs-on: ubuntu-latest
    env:
      CI: "1"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build tooling
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install --upgrade build twine

    - name: Build distributions
      run: |
        python -m build

    - name: Verify distributions
      run: |
        python -m twine check dist/*

    # to upload to test pypi, pass repository_url: https://test.pypi.org/legacy/ and use secrets.TEST_PYPI_TOKEN
    - name: Publish a Python distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_TOKEN }}
        # repository_url: https://test.pypi.org/legacy/
        packages_dir: dist/

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
